<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project N — 联机 1v1</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="hud">
      <div class="title">Project N — 联机 1v1 <span id="buildVer" class="ver">…</span> <span id="fps" class="ver"></span></div>
      <div class="hint">WASD 移动 · 左键射击 · R 换弹 · 1/2/3 切枪 · E 补弹 · Shift 冲刺 · Ctrl 蹲 · F8 全屏 · Esc 暂停</div>
    </div>

    <div id="vignette" aria-hidden="true"></div>
    <div id="crosshair" aria-hidden="true"><span></span></div>
    <div id="hitmarker" aria-hidden="true"></div>
    <div id="killBanner" aria-hidden="true"><span class="kb-icon">💀</span><span class="kb-text">击杀</span></div>
    <div id="prompt"></div>

    <div id="stats">
      <div class="row"><span class="label">击败</span><span id="score">0</span></div>
      <div class="row"><span class="label">武器</span><span id="weapon">步枪</span></div>
      <div class="row"><span class="label">冲刺</span><span id="sprint">关</span></div>
      <div class="row"><span class="label">弹药</span><span id="ammo">30 / 150</span></div>
      <div class="row"><span class="label">生命</span><span id="health">100</span></div>
    </div>

    <div id="oppStatus" class="hidden">对手 · HP <b id="oppHp">100</b></div>

    <!-- boot logo: loads while the gun model streams in -->
    <div id="bootLogo">
      <svg class="logoSvg" viewBox="0 0 320 200" aria-hidden="true">
        <polygon class="lg-hex" points="160,16 233,58 233,142 160,184 87,142 87,58" />
        <polygon class="lg-hex2" points="160,34 218,67 218,133 160,166 102,133 102,67" />
        <path class="lg-n" d="M126 146 L126 64 L194 146 L194 64" />
      </svg>
      <div class="logoText">PROJECT&nbsp;<span>N</span></div>
      <div class="logoTag">联机 1v1 · 加载中…</div>
    </div>

    <div id="overlay" class="hidden">
      <div class="panel">
        <h1>联机 1v1</h1>
        <p>练枪场 · 房间码对战</p>
        <button id="startBtn">点击开始</button>
        <button id="openNet" class="ghost">联机对战</button>
        <p class="sub">未联机时为单人练枪。Esc 释放鼠标</p>
      </div>
    </div>

    <div id="netPanel" class="hidden">
      <div class="net-card">
        <div class="net-head"><h2>联机对战 1v1</h2><button id="netClose" class="btn-tiny">关闭 ✕</button></div>
        <p class="net-desc">主机点「创建房间」得到一个房间码，发给好友；好友选「加入房间」输入房间码即可直接连上。需要联网（信令走公共服务器，对战数据点对点）。</p>
        <div class="net-roles">
          <button id="roleHost" class="net-role">创建房间<small>我是主机</small></button>
          <button id="roleGuest" class="net-role">加入房间<small>我是访客</small></button>
        </div>

        <div id="hostFlow" class="hidden net-flow">
          <label>把这个房间码发给好友：</label>
          <div class="room-code" id="roomCode">····</div>
          <button id="copyCode" class="btn-ghost">复制房间码</button>
        </div>

        <div id="guestFlow" class="hidden net-flow">
          <label>输入主机的房间码：</label>
          <input id="joinCode" class="auth-input" type="text" maxlength="8" placeholder="例如 4F7K2" style="text-transform:uppercase" />
          <button id="joinBtn" class="btn-primary">加入</button>
        </div>

        <div id="netMsg" class="net-msg"></div>
      </div>
    </div>

    <script type="module" src="./src/main.js?v=DEV"></script>
  </body>
</html>
