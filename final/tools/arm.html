<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AK 手臂调节器 · Project N</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0b1018; font-family: system-ui, sans-serif; }
      #c { display: block; }
      #cross { position: fixed; left: 50%; top: 50%; width: 18px; height: 18px; transform: translate(-50%, -50%); pointer-events: none; }
      #cross::before, #cross::after { content: ""; position: absolute; background: #fff; }
      #cross::before { left: 8px; top: 0; width: 2px; height: 18px; }
      #cross::after { top: 8px; left: 0; width: 18px; height: 2px; }
      #panel { position: fixed; top: 10px; left: 10px; width: 300px; background: rgba(14,20,30,0.92); border: 1px solid #2a3a4f; border-radius: 10px; padding: 12px 14px; color: #d8e2ee; font-size: 12px; max-height: 96vh; overflow-y: auto; }
      #panel h1 { font-size: 14px; color: #7fd1ff; margin-bottom: 4px; }
      #panel .note { color: #8fa8bf; font-size: 11px; margin-bottom: 8px; line-height: 1.5; }
      .row { display: flex; align-items: center; gap: 6px; margin: 5px 0; }
      .row label { width: 46px; color: #9fb3c8; }
      .row input[type=range] { flex: 1; }
      .row input[type=number] { width: 64px; background: #0c141e; color: #d8e2ee; border: 1px solid #2a3a4f; border-radius: 4px; padding: 2px 4px; }
      .grp { border-top: 1px solid #233244; margin-top: 8px; padding-top: 6px; color: #9fb3c8; }
      #out { width: 100%; height: 96px; margin-top: 8px; background: #07101a; color: #8effb0; border: 1px solid #2a3a4f; border-radius: 6px; font-family: monospace; font-size: 12px; padding: 6px; }
      .btns { display: flex; gap: 6px; margin-top: 6px; }
      button { flex: 1; background: #1d3146; color: #d8e2ee; border: 1px solid #2a4a66; border-radius: 6px; padding: 6px; cursor: pointer; font-size: 12px; }
      button:hover { background: #294866; }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <div id="cross"></div>
    <div id="panel">
      <h1>AK 手臂调节器</h1>
      <div class="note">只调「手臂相对枪身」的位置/角度（金枪固定）。调到贴合后点复制，把参数发我。</div>
      <div class="grp">位置（OBJ 单位）</div>
      <div class="row"><label>px</label><input type="range" id="px_r" min="-8" max="8" step="0.1" /><input type="number" id="px_n" step="0.1" /></div>
      <div class="row"><label>py</label><input type="range" id="py_r" min="-8" max="8" step="0.1" /><input type="number" id="py_n" step="0.1" /></div>
      <div class="row"><label>pz</label><input type="range" id="pz_r" min="-8" max="8" step="0.1" /><input type="number" id="pz_n" step="0.1" /></div>
      <div class="grp">旋转（弧度）</div>
      <div class="row"><label>rx</label><input type="range" id="rx_r" min="-1.6" max="1.6" step="0.02" /><input type="number" id="rx_n" step="0.02" /></div>
      <div class="row"><label>ry</label><input type="range" id="ry_r" min="-1.6" max="1.6" step="0.02" /><input type="number" id="ry_n" step="0.02" /></div>
      <div class="row"><label>rz</label><input type="range" id="rz_r" min="-1.6" max="1.6" step="0.02" /><input type="number" id="rz_n" step="0.02" /></div>
      <textarea id="out" readonly></textarea>
      <div class="btns"><button id="copy">复制参数</button><button id="reset">归零</button></div>
    </div>

    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script type="module">
      import * as THREE from "three";
      import { OBJLoader } from "three/addons/loaders/OBJLoader.js";

      // whole-model transform (matches the game / akmodel.js)
      const SCALE = 0.127, ROT = new THREE.Euler(0, 0.02, 0), POS = new THREE.Vector3(-0.625, -1.055, 0.345), REF_ASPECT = 16 / 9;
      const TEX = ["view_glove.png","view_skin.png","view_finger.png","QS_AK1.png","QS_AK2.png","QS_AK3.png","QS_AK4.png","QS_AK5.png"];
      const state = { px: 0, py: 0, pz: 0, rx: 0, ry: 0, rz: 0 };

      const canvas = document.getElementById("c");
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      const scene = new THREE.Scene(); scene.background = new THREE.Color(0x0e1622);
      const camera = new THREE.PerspectiveCamera(72, 1, 0.08, 200); scene.add(camera);
      scene.add(new THREE.HemisphereLight(0xcfe6ff, 0x1a2433, 1.0));
      const dir = new THREE.DirectionalLight(0xfff4e0, 1.6); dir.position.set(0.4, 1, 0.6); scene.add(dir);
      function resize() { renderer.setSize(innerWidth, innerHeight); camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); }
      addEventListener("resize", resize); resize();

      const aspectGroup = new THREE.Group(); const mirrorGroup = new THREE.Group(); const holder = new THREE.Group();
      aspectGroup.add(mirrorGroup); mirrorGroup.add(holder); camera.add(aspectGroup);
      mirrorGroup.scale.x = -1; // game mirrors to right-handed

      const texLoader = new THREE.TextureLoader().setPath("../assets/ak/");
      const cache = {}; const tex = (i) => (cache[i] || (cache[i] = (() => { const t = texLoader.load(TEX[i]); t.colorSpace = THREE.SRGBColorSpace; return t; })()));
      let inner = null, armWrap = null;

      const objl = new OBJLoader().setPath("../assets/ak/");
      objl.load("v_ak47_gun.obj", (gun) => {
        gun.traverse((o) => { if (o.isMesh) { o.material = (Array.isArray(o.material) ? o.material : [o.material]).map((m) => { const k = /tex(\d+)/.exec(m.name || ""); return new THREE.MeshBasicMaterial({ map: tex(k ? +k[1] : 3), transparent: true, alphaTest: 0.5, side: THREE.DoubleSide }); }); if (!Array.isArray(o.material)) o.material = o.material[0]; } });
        objl.load("v_ak47_arms.obj", (arms) => {
          arms.traverse((o) => { if (o.isMesh) o.material = new THREE.MeshStandardMaterial({ color: 0xd9a578, roughness: 0.75, side: THREE.DoubleSide }); });
          inner = new THREE.Group(); inner.add(gun);
          armWrap = new THREE.Group(); armWrap.add(arms); inner.add(armWrap);
          inner.scale.setScalar(SCALE); inner.rotation.copy(ROT);
          holder.add(inner); apply();
        });
      });

      function apply() {
        if (!inner) return;
        armWrap.position.set(state.px, state.py, state.pz);
        armWrap.rotation.set(state.rx, state.ry, state.rz);
        // normalise un-mirrored (match the game's centring)
        inner.position.set(0, 0, 0);
        const ax = aspectGroup.scale.x; aspectGroup.scale.x = 1; mirrorGroup.scale.x = 1; aspectGroup.updateMatrixWorld(true);
        const box = new THREE.Box3().setFromObject(holder); const c = box.getCenter(new THREE.Vector3());
        inner.position.x += POS.x - c.x; inner.position.y += POS.y - c.y; inner.position.z += POS.z - box.max.z;
        aspectGroup.scale.x = ax; mirrorGroup.scale.x = -1;
        out();
      }
      function out() {
        const f = (v) => v.toFixed(3).replace(/\.?0+$/, "") || "0";
        document.getElementById("out").value = `const A = { px: ${f(state.px)}, py: ${f(state.py)}, pz: ${f(state.pz)}, rx: ${f(state.rx)}, ry: ${f(state.ry)}, rz: ${f(state.rz)} };`;
      }
      const keys = [["px","px_r","px_n"],["py","py_r","py_n"],["pz","pz_r","pz_n"],["rx","rx_r","rx_n"],["ry","ry_r","ry_n"],["rz","rz_r","rz_n"]];
      function sync() { for (const [k, r, n] of keys) { document.getElementById(r).value = state[k]; document.getElementById(n).value = state[k]; } }
      for (const [k, r, n] of keys) {
        const rr = document.getElementById(r), nn = document.getElementById(n);
        const set = (v) => { state[k] = parseFloat(v) || 0; rr.value = v; nn.value = v; apply(); };
        rr.addEventListener("input", (e) => set(e.target.value));
        nn.addEventListener("input", (e) => set(e.target.value));
      }
      document.getElementById("copy").addEventListener("click", () => { navigator.clipboard.writeText(document.getElementById("out").value); const b = document.getElementById("copy"); b.textContent = "已复制 ✓"; setTimeout(() => b.textContent = "复制参数", 1200); });
      document.getElementById("reset").addEventListener("click", () => { for (const k of Object.keys(state)) state[k] = 0; sync(); apply(); });
      sync();
      renderer.setAnimationLoop(() => { aspectGroup.scale.x = camera.aspect / REF_ASPECT; renderer.render(scene, camera); });
    </script>
  </body>
</html>
