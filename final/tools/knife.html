<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>近战刀·手臂对位调节器 · Project N</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0b1018; font-family: system-ui, sans-serif; }
      #c { display: block; }
      #cross { position: fixed; left: 50%; top: 50%; width: 18px; height: 18px; transform: translate(-50%, -50%); pointer-events: none; }
      #cross::before, #cross::after { content: ""; position: absolute; background: #fff; }
      #cross::before { left: 8px; top: 0; width: 2px; height: 18px; }
      #cross::after { top: 8px; left: 0; width: 18px; height: 2px; }
      #panel { position: fixed; top: 10px; left: 10px; width: 300px; background: rgba(14,20,30,0.92); border: 1px solid #2a3a4f; border-radius: 10px; padding: 12px 14px; color: #d8e2ee; font-size: 12px; max-height: 96vh; overflow-y: auto; }
      #panel h1 { font-size: 14px; color: #7fd1ff; margin-bottom: 4px; }
      #panel .note { color: #8fa8bf; font-size: 11px; margin-bottom: 8px; line-height: 1.5; }
      .row { display: flex; align-items: center; gap: 6px; margin: 5px 0; }
      .row label { width: 46px; color: #9fb3c8; }
      .row input[type=range] { flex: 1; }
      .row input[type=number] { width: 64px; background: #0c141e; color: #d8e2ee; border: 1px solid #2a3a4f; border-radius: 4px; padding: 2px 4px; }
      .grp { border-top: 1px solid #233244; margin-top: 8px; padding-top: 6px; color: #9fb3c8; }
      #out { width: 100%; height: 70px; margin-top: 8px; background: #07101a; color: #8effb0; border: 1px solid #2a3a4f; border-radius: 6px; font-family: monospace; font-size: 12px; padding: 6px; }
      .btns { display: flex; gap: 6px; margin-top: 6px; }
      button { flex: 1; background: #1d3146; color: #d8e2ee; border: 1px solid #2a4a66; border-radius: 6px; padding: 6px; cursor: pointer; font-size: 12px; }
      button:hover { background: #294866; }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <div id="cross"></div>
    <div id="panel">
      <h1>近战刀 · 手臂对位</h1>
      <div class="note">刀的位置已固定为游戏里的值。这里调「AK 手臂相对刀」的大小/位置/角度，让手握住刀柄。调好点复制发我。</div>
      <div class="grp">手臂缩放</div>
      <div class="row"><label>s</label><input type="range" id="s_r" min="0.005" max="0.08" step="0.001" /><input type="number" id="s_n" step="0.001" /></div>
      <div class="grp">手臂位置</div>
      <div class="row"><label>px</label><input type="range" id="px_r" min="-1" max="1" step="0.01" /><input type="number" id="px_n" step="0.01" /></div>
      <div class="row"><label>py</label><input type="range" id="py_r" min="-1" max="1" step="0.01" /><input type="number" id="py_n" step="0.01" /></div>
      <div class="row"><label>pz</label><input type="range" id="pz_r" min="-1" max="1" step="0.01" /><input type="number" id="pz_n" step="0.01" /></div>
      <div class="grp">手臂旋转</div>
      <div class="row"><label>rx</label><input type="range" id="rx_r" min="-3.14" max="3.14" step="0.02" /><input type="number" id="rx_n" step="0.02" /></div>
      <div class="row"><label>ry</label><input type="range" id="ry_r" min="-3.14" max="3.14" step="0.02" /><input type="number" id="ry_n" step="0.02" /></div>
      <div class="row"><label>rz</label><input type="range" id="rz_r" min="-3.14" max="3.14" step="0.02" /><input type="number" id="rz_n" step="0.02" /></div>
      <textarea id="out" readonly></textarea>
      <div class="btns"><button id="copy">复制参数</button><button id="reset">恢复默认</button></div>
    </div>

    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script type="module">
      import * as THREE from "three";
      import { OBJLoader } from "three/addons/loaders/OBJLoader.js";
      import { buildKnife } from "../src/models.js";

      const REF_ASPECT = 16 / 9;
      // current in-game knife placement (viewmodel.js BASE.knife)
      const KNIFE = { pos: new THREE.Vector3(-0.08, -0.13, -0.67), rot: new THREE.Euler(-0.36, 0.24, -0.52), scale: 1.12 };
      const DEFAULTS = { s: 0.03, px: 0, py: -0.1, pz: 0.1, rx: 0, ry: 0, rz: 0 };
      const state = { ...DEFAULTS };

      const canvas = document.getElementById("c");
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      const scene = new THREE.Scene(); scene.background = new THREE.Color(0x0e1622);
      const camera = new THREE.PerspectiveCamera(72, 1, 0.08, 200); scene.add(camera);
      scene.add(new THREE.HemisphereLight(0xcfe6ff, 0x1a2433, 1.1));
      const dir = new THREE.DirectionalLight(0xfff4e0, 1.6); dir.position.set(0.4, 1, 0.6); scene.add(dir);
      function resize() { renderer.setSize(innerWidth, innerHeight); camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); }
      addEventListener("resize", resize); resize();

      const aspectGroup = new THREE.Group(); camera.add(aspectGroup);
      const built = buildKnife();
      const knife = built.group;
      knife.position.copy(KNIFE.pos); knife.rotation.copy(KNIFE.rot); knife.scale.setScalar(KNIFE.scale);
      knife.traverse((o) => { o.frustumCulled = false; });
      aspectGroup.add(knife);

      let arms = null;
      new OBJLoader().setPath("../assets/ak/").load("v_ak47_arms.obj", (root) => {
        root.traverse((o) => { if (o.isMesh) o.material = new THREE.MeshStandardMaterial({ color: 0xd9a578, roughness: 0.75, side: THREE.DoubleSide }); });
        arms = root; built.blade.add(arms); apply();
      });

      function apply() {
        if (!arms) return;
        arms.scale.setScalar(state.s);
        arms.position.set(state.px, state.py, state.pz);
        arms.rotation.set(state.rx, state.ry, state.rz);
        out();
      }
      function out() {
        const f = (v) => v.toFixed(3).replace(/\.?0+$/, "") || "0";
        document.getElementById("out").value = `const KA = { s: ${f(state.s)}, px: ${f(state.px)}, py: ${f(state.py)}, pz: ${f(state.pz)}, rx: ${f(state.rx)}, ry: ${f(state.ry)}, rz: ${f(state.rz)} };`;
      }
      const keys = [["s","s_r","s_n"],["px","px_r","px_n"],["py","py_r","py_n"],["pz","pz_r","pz_n"],["rx","rx_r","rx_n"],["ry","ry_r","ry_n"],["rz","rz_r","rz_n"]];
      function sync() { for (const [k, r, n] of keys) { document.getElementById(r).value = state[k]; document.getElementById(n).value = state[k]; } }
      for (const [k, r, n] of keys) {
        const rr = document.getElementById(r), nn = document.getElementById(n);
        const set = (v) => { state[k] = parseFloat(v); rr.value = v; nn.value = v; apply(); };
        rr.addEventListener("input", (e) => set(e.target.value));
        nn.addEventListener("input", (e) => set(e.target.value));
      }
      document.getElementById("copy").addEventListener("click", () => { navigator.clipboard.writeText(document.getElementById("out").value); const b = document.getElementById("copy"); b.textContent = "已复制 ✓"; setTimeout(() => b.textContent = "复制参数", 1200); });
      document.getElementById("reset").addEventListener("click", () => { Object.assign(state, DEFAULTS); sync(); apply(); });
      sync(); out();
      renderer.setAnimationLoop(() => { aspectGroup.scale.x = camera.aspect / REF_ASPECT; renderer.render(scene, camera); });
    </script>
  </body>
</html>
