name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/charming-lovelace-9peiva
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-create the Pages site if it isn't enabled yet
          enablement: true

      - name: Cache-bust module versions
        # Replace the ?v=DEV placeholder on local imports with the commit SHA
        # so browsers always fetch fresh modules after a deploy.
        run: |
          VER="${GITHUB_SHA::8}"
          find . -path ./.git -prune -o \( -name '*.js' -o -name '*.html' \) -print \
            | xargs sed -i "s/?v=DEV/?v=${VER}/g"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo is a static site (index.html lives at the root)
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
